<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wireframe Layout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <!-- LEFT -->
  <div>
    <div class="card">
      <div class="top-row">
        <div class="av-col">
          <div class="circ c1-lg"></div>
          <div class="circ c2-md"></div>
          <div class="circ c3-sm"></div>
          <div class="circ c4-xs"></div>
        </div>
        <div class="card-text">
          <p>Lorem ipsum sed hic accepta blanditiis perferendis, eaque facilis accusantium voluptatis. Illo, vero illum harum rerum qui sit at nusellibus non ipsam.</p>
        </div>
      </div>
      <div class="g3">
        <div class="cell box"></div>
        <div class="cell box"></div>
        <div class="cell box"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="circ c1-sm"></div>
          <div class="sbars"><div class="bar"></div><div class="bar w-75"></div><div class="bar w-55"></div></div>
        </div>
        <div class="stat">
          <div class="circ c2-sm"></div>
          <div class="sbars"><div class="bar"></div><div class="bar w-65"></div><div class="bar w-80"></div></div>
        </div>
        <div class="stat">
          <div class="circ c3-sm"></div>
          <div class="sbars"><div class="bar"></div><div class="bar w-50"></div><div class="bar w-70"></div></div>
        </div>
      </div>
      <div class="lorem"><span>Lorem</span><div class="bar"></div></div>
    </div>

    <div class="vrow">
      <div class="vbox"><div class="play"></div></div>
      <div class="tlines">
        <div class="bar"></div><div class="bar w-80"></div>
        <div class="bar"></div><div class="bar w-60"></div><div class="bar w-75"></div>
      </div>
    </div>
    <div class="g4">
      <div class="tag box"></div><div class="tag box"></div>
      <div class="tag box"></div><div class="tag box"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div>
    <div class="card">
      <div class="crow">
        <div class="circ c1-lg"></div>
        <div class="circ c2-md"></div>
        <div class="circ c3-sm"></div>
        <div class="circ c4-xs"></div>
        <div class="bar"></div>
        <div class="bar w-28"></div>
      </div>
      <div class="lines">
        <div class="bar"></div><div class="bar w-80"></div><div class="bar"></div>
      </div>
      <div class="g2">
        <div class="img-cell box"></div>
        <div class="img-cell box"></div>
      </div>
      <div class="cs">
        <div class="cs-item">
          <div class="circ c1-sm"></div>
          <div class="bar"></div><div class="bar w-65"></div>
        </div>
        <div class="cs-item">
          <div class="circ c2-sm"></div>
          <div class="bar"></div><div class="bar w-50"></div>
        </div>
        <div class="cs-item">
          <div class="circ c3-sm"></div>
          <div class="bar"></div><div class="bar w-70"></div>
        </div>
      </div>
    </div>

    <div class="lines-wrap">
      <div class="lines">
        <div class="bar"></div><div class="bar w-75"></div><div class="bar w-90"></div>
      </div>
      <div class="lorem"><span>Lorem</span><div class="bar"></div></div>
      <div class="vrow">
        <div class="vbox"><div class="play"></div></div>
        <div class="tlines">
          <div class="bar"></div><div class="bar w-70"></div>
          <div class="bar"></div><div class="bar w-55"></div>
        </div>
      </div>
      <div class="g4">
        <div class="tag box"></div><div class="tag box"></div>
        <div class="tag box"></div><div class="tag box"></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="side-card-wrap">
      <div class="card">
        <div class="side-top">
          <div class="circ c1-md"></div>
          <div class="tlines">
            <div class="bar"></div><div class="bar w-70"></div>
          </div>
        </div>
        <div class="mini-c">
          <div class="circ c2-xs"></div>
          <div class="circ c3-xs"></div>
          <div class="circ c4-xs"></div>
        </div>
        <div class="tlines">
          <div class="bar"></div><div class="bar w-80"></div>
          <div class="bar w-60"></div><div class="bar"></div>
        </div>
      </div>
    </div>

    <div class="feed">
      <div class="fi">
        <div class="circ c1-sm"></div>
        <div class="tlines">
          <div class="bar"></div><div class="bar w-75"></div><div class="bar w-55"></div>
        </div>
      </div>
      <div class="fi">
        <div class="circ c2-sm"></div>
        <div class="tlines">
          <div class="bar"></div><div class="bar w-65"></div><div class="bar w-80"></div>
        </div>
      </div>
      <div class="fi">
        <div class="circ c3-sm"></div>
        <div class="tlines">
          <div class="bar"></div><div class="bar w-70"></div><div class="bar w-50"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="ml">media</div>
      <div class="tlines">
        <div class="bar"></div><div class="bar w-85"></div>
        <div class="bar"></div><div class="bar w-70"></div>
        <div class="bar w-90"></div><div class="bar"></div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
